name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        working-directory: ./backend
        run: mvn clean verify

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  ai-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Dependencies
        working-directory: ./ai-engine
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Tests
        working-directory: ./ai-engine
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint & Build
        working-directory: ./frontend
        run: |
          npm run lint
          npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  docker:
    runs-on: ubuntu-latest
    needs: [backend, ai-engine, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Images
        run: |
          docker build -t infrarecord-backend:latest ./backend
          docker build -t infrarecord-ai:latest ./ai-engine
          docker build -t infrarecord-frontend:latest ./frontend
