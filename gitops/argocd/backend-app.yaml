apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrarecord-backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/joemacibi/InfraRecord.git
    targetRevision: HEAD
    path: gitops/manifests/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: infrarecord
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
