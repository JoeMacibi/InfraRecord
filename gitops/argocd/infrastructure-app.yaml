apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrarecord-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joemacibi/InfraRecord.git
    targetRevision: HEAD
    path: gitops/manifests/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: infrarecord
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
