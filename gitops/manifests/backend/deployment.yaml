apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrarecord-backend
  namespace: infrarecord
  labels:
    app: infrarecord-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infrarecord-backend
  template:
    metadata:
      labels:
        app: infrarecord-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/joemacibi/infrarecord/backend:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "infrarecord"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: infrarecord-secrets
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: infrarecord-secrets
                  key: db-password
            - name: KAFKA_BOOTSTRAP
              value: "kafka:29092"
            - name: AI_SERVICE_URL
              value: "http://infrarecord-ai:8000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: infrarecord-backend
  namespace: infrarecord
spec:
  selector:
    app: infrarecord-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrarecord-backend
  namespace: infrarecord
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.infrarecord.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infrarecord-backend
                port:
                  number: 8080
