apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrarecord-frontend
  namespace: infrarecord
  labels:
    app: infrarecord-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infrarecord-frontend
  template:
    metadata:
      labels:
        app: infrarecord-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/joemacibi/infrarecord/frontend:v1.0.0
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: infrarecord-frontend
  namespace: infrarecord
spec:
  selector:
    app: infrarecord-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrarecord-frontend
  namespace: infrarecord
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: infrarecord.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infrarecord-frontend
                port:
                  number: 80
