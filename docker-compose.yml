version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: infrarecord-postgres
    environment:
      POSTGRES_DB: infrarecord
      POSTGRES_USER: infrarecord
      POSTGRES_PASSWORD: infrarecord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrarecord -d infrarecord"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrarecord

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: infrarecord-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - infrarecord

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: infrarecord-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infrarecord

  # AI Engine (FastAPI)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: infrarecord-ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - infrarecord

  # Backend (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrarecord-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: infrarecord
      DB_USER: infrarecord
      DB_PASS: infrarecord
      KAFKA_BOOTSTRAP: kafka:29092
      AI_SERVICE_URL: http://ai-engine:8000
      JWT_SECRET: InfraRecordLocalDevKey2026
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - infrarecord

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infrarecord-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    networks:
      - infrarecord

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: infrarecord-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - infrarecord

  # Grafana
  grafana:
    image: grafana/grafana:10.4.0
    container_name: infrarecord-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - infrarecord

  # Mock Telemetry Generator
  telemetry-generator:
    build:
      context: ./scripts
      dockerfile: Dockerfile.telemetry
    container_name: infrarecord-telemetry
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      INTERVAL_SECONDS: 10
    networks:
      - infrarecord
    profiles:
      - demo

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  infrarecord:
    driver: bridge
